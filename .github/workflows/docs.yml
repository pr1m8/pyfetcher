name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - ".readthedocs.yaml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pdm install -G all
          pip install -r docs/requirements.txt

      - name: Build docs
        run: sphinx-build -b html docs/ docs/_build/html -W
